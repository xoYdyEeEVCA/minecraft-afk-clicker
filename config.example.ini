```ini
[General]
# Set the delay between clicks in milliseconds
ClickDelay=100

# Enable or disable auto-resume after idle time
AutoResume=true

# Set the idle time threshold in seconds before auto-resume is triggered
IdleTimeThreshold=10

[Hotkeys]
# Define the hotkey to start the clicker
StartHotkey=F9

# Define the hotkey to stop the clicker
StopHotkey=F10

# Define the hotkey to toggle the clicker on/off
ToggleHotkey=F11

[Features]
# Enable or disable right-clicking in addition to left-clicking
EnableRightClick=true

# Automatically use a selected item from the hotbar when clicking
AutoUseItem=true

# Specify which hotbar slot to use (0-8 for slots 1-9)
SelectedHotbarSlot=0

# Enable chat message logging
ChatLogging=false

[Display]
# Set the transparency level of the clicker window (0-255)
WindowTransparency=200

# Choose the position of the clicker window: TopLeft, TopRight, BottomLeft, BottomRight, Center
WindowPosition=BottomRight

# Enable or disable showing feedback notifications when clicking
ShowNotifications=true
```